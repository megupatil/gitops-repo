apiVersion: apps/v1
kind: Deployment
metadata:
  name: boutique-frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: boutique-frontend

  template:
    metadata:
      labels:
        app: boutique-frontend

    spec:
      containers:
      - name: frontend
        image: nginx:latest

        ports:
        - containerPort: 80