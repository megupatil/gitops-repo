apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: online-boutique
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/megupatil/gitops-repo.git
    targetRevision: HEAD
    path: base

  destination:
    server: https://kubernetes.default.svc
    namespace: online-boutique

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true